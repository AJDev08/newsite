<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Subah Jaldi Utha Dena</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:black;

      overflow:hidden;

      font-family:Arial, sans-serif;
    }

    h1{

      color:white;

      font-size:12vw;

      text-align:center;

      letter-spacing:4px;

      text-transform:uppercase;

      text-shadow:
      0 0 10px white,
      0 0 30px white,
      0 0 60px #38bdf8;

      animation: glow 2s infinite alternate;
    }

    @keyframes glow{

      from{
        transform:scale(1);
      }

      to{
        transform:scale(1.04);
      }

    }

  </style>

</head>

<body>

  <h1>SUBAH JALDI UTHA DENA</h1>

</body>

</html>
